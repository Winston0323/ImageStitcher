name: image_stitching
description: 图片拼接工具 - 支持水平和垂直对齐拼接

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 文件选择与保存（跨平台）
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  
  # Android 原生相册选取
  image_picker: ^1.2.1

  # 相册管理（自定义画廊选择器）
  photo_manager: ^3.8.1
  
  # 保存图片到系统相册（自定义相簿）
  gal: ^2.3.0


  
  # UI 组件
  cupertino_icons: ^1.0.6
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
